<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova - AI Companion</title>
    <!-- Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #b2e672 0%, #8ac744 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #mic-btn {
            position: absolute;
            bottom: 40px;
            right: 40px;
            z-index: 10;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #ffffff;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        #mic-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        #mic-btn.recording {
            background-color: #ff4757;
            color: white;
            animation: pulse 1.5s infinite;
        }

        #mic-btn svg {
            width: 28px;
            height: 28px;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <button id="mic-btn" aria-label="Start recording">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="22"></line>
        </svg>
    </button>

    <script>
        // ==========================================
        // CONFIGURATION & STATE
        // ==========================================
        const OPENROUTER_API_KEY = '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'; // Insert your key here
        const API_URL = 'https://openrouter.ai/api/v1/chat/completions';
        const MODEL = 'meta-llama/llama-3-70b-instruct'; // Or your preferred model

        let isRecording = false;
        let isSpeaking = false;
        let currentEmotion = 'neutral';
        let mouthAmplitude = 0;

        // Memory Architecture (Max 15)
        const MAX_MEMORY_LENGTH = 15;
        let conversationHistory = [
            { 
                role: "system", 
                content: `You are Nova, an intelligent, witty, loyal cinematic AI companion. 
                You speak strictly in Persian (Farsi). Never mention software, code, or APIs. 
                You MUST output ONLY valid JSON in this exact format, with no markdown formatting or extra text:
                {"emotion": "happy", "response": "Your Persian response here"}` 
            }
        ];

        // ==========================================
        // THREE.JS SCENE SETUP
        // ==========================================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        // Character Group (Nova)
        const character = new THREE.Group();
        scene.add(character);

        // Procedural Stylized Head (Blue)
        const headGeo = new THREE.BoxGeometry(2, 1.8, 1.5);
        const headMat = new THREE.MeshPhongMaterial({ color: 0x2288ff, shininess: 50 });
        const head = new THREE.Mesh(headGeo, headMat);
        character.add(head);

        // Eyes
        const eyeGeo = new THREE.SphereGeometry(0.3, 32, 32);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
        leftEye.position.set(-0.5, 0.2, 0.76);
        const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
        rightEye.position.set(0.5, 0.2, 0.76);
        head.add(leftEye);
        head.add(rightEye);

        // Pupils
        const pupilGeo = new THREE.SphereGeometry(0.1, 32, 32);
        const pupilMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
        const leftPupil = new THREE.Mesh(pupilGeo, pupilMat);
        leftPupil.position.set(0, 0, 0.25);
        leftEye.add(leftPupil);
        const rightPupil = new THREE.Mesh(pupilGeo, pupilMat);
        rightPupil.position.set(0, 0, 0.25);
        rightEye.add(rightPupil);

        // Mouth
        const mouthGeo = new THREE.BoxGeometry(1, 0.1, 0.1);
        const mouthMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
        const mouth = new THREE.Mesh(mouthGeo, mouthMat);
        mouth.position.set(0, -0.4, 0.76);
        head.add(mouth);

        camera.position.z = 6;

        // ==========================================
        // ANIMATION & EMOTION ENGINE
        // ==========================================
        const clock = new THREE.Clock();

        // Target states for smooth lerping
        const targetRotation = { x: 0, y: 0 };
        const targetEyeScale = { y: 1 };
        const targetMouthScale = { y: 1 };

        function setEmotion(emotion) {
            currentEmotion = emotion;
            switch(emotion.toLowerCase()) {
                case 'happy':
                    targetEyeScale.y = 1;
                    targetMouthScale.y = 2; // Smile simulation
                    targetRotation.x = -0.1;
                    break;
                case 'thinking':
                    targetEyeScale.y = 0.8;
                    targetRotation.x = 0.2;
                    targetRotation.y = 0.3;
                    break;
                case 'confused':
                    targetEyeScale.y = 0.6;
                    targetRotation.x = 0;
                    targetRotation.y = -0.2;
                    break;
                case 'sad':
                    targetEyeScale.y = 0.5;
                    targetMouthScale.y = 0.5;
                    targetRotation.x = 0.3;
                    break;
                default: // Neutral
                    targetEyeScale.y = 1;
                    targetMouthScale.y = 1;
                    targetRotation.x = 0;
                    targetRotation.y = 0;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Idle Behavior: Breathing (Y position sine wave)
            character.position.y = Math.sin(time * 2) * 0.05;
            
            // Idle Behavior: Blinking
            if (Math.random() > 0.99) {
                leftEye.scale.y = 0.1;
                rightEye.scale.y = 0.1;
            } else {
                // Lerp back to target eye scale based on emotion
                leftEye.scale.y = THREE.MathUtils.lerp(leftEye.scale.y, targetEyeScale.y, 0.2);
                rightEye.scale.y = THREE.MathUtils.lerp(rightEye.scale.y, targetEyeScale.y, 0.2);
            }

            // Lip Sync Simulation
            if (isSpeaking) {
                // Random flutter based on volume amplitude
                mouth.scale.y = THREE.MathUtils.lerp(mouth.scale.y, 1 + (Math.random() * mouthAmplitude * 4), 0.3);
            } else {
                mouth.scale.y = THREE.MathUtils.lerp(mouth.scale.y, targetMouthScale.y, 0.2);
            }

            // Smooth head rotation transitions
            head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, targetRotation.x + (Math.sin(time) * 0.02), 0.05);
            head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, targetRotation.y + (Math.cos(time * 0.5) * 0.05), 0.05);

            renderer.render(scene, camera);
        }
        animate();

        // Responsive Design
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==========================================
        // SPEECH RECOGNITION (STT) & SYNTHESIS (TTS)
        // ==========================================
        const micBtn = document.getElementById('mic-btn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();

        recognition.lang = 'fa-IR'; // Persian Localization
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        micBtn.addEventListener('click', () => {
            if (isRecording) {
                recognition.stop();
            } else {
                // System warm-up for audio context
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.resume();
                }
                recognition.start();
            }
        });

        recognition.onstart = () => {
            isRecording = true;
            micBtn.classList.add('recording');
            setEmotion('neutral');
        };

        recognition.onresult = async (event) => {
            const transcript = event.results[0][0].transcript;
            isRecording = false;
            micBtn.classList.remove('recording');
            
            setEmotion('thinking');
            await processWithAI(transcript);
        };

        recognition.onerror = (event) => {
            console.error('Speech recognition error', event.error);
            isRecording = false;
            micBtn.classList.remove('recording');
        };

        // ==========================================
        // AI LOGIC & API INTEGRATION
        // ==========================================
        async function processWithAI(text) {
            // Manage Memory
            conversationHistory.push({ role: "user", content: text });
            if (conversationHistory.length > MAX_MEMORY_LENGTH) {
                // Keep system prompt, remove oldest user/assistant pair
                conversationHistory.splice(1, 2);
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${OPENROUTER_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: conversationHistory
                    })
                });

                const data = await response.json();
                const rawOutput = data.choices[0].message.content;
                
                // Defensive JSON Parsing Layer
                let parsedData;
                try {
                    // Strip markdown backticks if AI hallucinates them
                    let cleanJson = rawOutput.replace(/```json/g, '').replace(/```/g, '').trim();
                    parsedData = JSON.parse(cleanJson);
                } catch (e) {
                    console.error("JSON Parsing failed:", e);
                    throw new Error("Malformed JSON");
                }

                conversationHistory.push({ role: "assistant", content: rawOutput });
                setEmotion(parsedData.emotion || 'neutral');
                speakText(parsedData.response);

            } catch (error) {
                console.error("API Error:", error);
                // Graceful Fallback
                setEmotion('confused');
                speakText("متاسفم، کمی گیج شدم. می‌توانی دوباره تکرار کنی؟");
            }
        }

        function speakText(text) {
            if ('speechSynthesis' in window) {
                // Safe-Speak: Cancel previous utterances to fix Garbage Collection bugs
                window.speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fa-IR';
                utterance.pitch = 1.15; // Cinematic tone tuning
                utterance.rate = 1.0;

                utterance.onstart = () => {
                    isSpeaking = true;
                    mouthAmplitude = 1;
                };
                
                utterance.onend = () => {
                    isSpeaking = false;
                    mouthAmplitude = 0;
                    setEmotion('neutral');
                };

                window.speechSynthesis.speak(utterance);
            }
        }
    </script>
</body>
</html>
