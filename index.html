<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Digital Companion (OpenRouter Edition)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle, #2a2a35 0%, #111115 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .btn {
            padding: 15px 35px;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            pointer-events: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        #status-indicator {
            position: absolute;
            bottom: 40px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <button id="start-btn" class="btn">Wake Up Companion</button>
        <div id="status-indicator" style="display: none;">IDLE</div>
    </div>

    <script>
        // --- تنظیمات OpenRouter ---
        const OPENROUTER_API_KEY = "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"; // کلید اپن‌رایتر خودت را اینجا بذار
        const MODEL_NAME = "google/gemma-4-31b-it:free"; // می‌توانی با هر مدلی در OpenRouter تعویضش کنی

        // --- متغیرهای گرافیکی Three.js ---
        let scene, camera, renderer, character, head, leftEye, rightEye, mouth;
        let clock = new THREE.Clock();
        
        // --- وضعیت‌های سیستم ---
        let currentStatus = 'IDLE'; 
        let currentEmotion = 'neutral'; 

        const startBtn = document.getElementById('start-btn');
        const statusIndicator = document.getElementById('status-indicator');

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            statusIndicator.style.display = 'block';
            initGraphics();
            initVoiceSystem();
        });

        // --- ۱. طراحی کاراکتر سه‌بعدی مینیمال پیکساری ---
        function initGraphics() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // نورپردازی محیطی سینمایی
            const ambientLight = new THREE.AmbientLight(0x666677, 0.8);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffeebb, 1.2);
            directionalLight.position.set(5, 5, 4);
            scene.add(directionalLight);

            character = new THREE.Group();
            
            // سر
            const headGeo = new THREE.SphereGeometry(0.8, 32, 32);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xdddddf, roughness: 0.2, metalness: 0.1 });
            head = new THREE.Mesh(headGeo, headMat);
            character.add(head);

            // چشم‌ها (درخشان)
            const eyeGeo = new THREE.SphereGeometry(0.12, 16, 16);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff }); 
            
            leftEye = new THREE.Mesh(eyeGeo, eyeMat);
            leftEye.position.set(-0.25, 0.1, 0.7);
            head.add(leftEye);

            rightEye = new THREE.Mesh(eyeGeo, eyeMat);
            rightEye.position.set(0.25, 0.1, 0.7);
            head.add(rightEye);

            // دهان دیجیتالی
            const mouthGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.05, 16);
            const mouthMat = new THREE.MeshStandardMaterial({ color: 0x33333b, roughness: 0.5 });
            mouth = new THREE.Mesh(mouthGeo, mouthMat);
            mouth.position.set(0, -0.25, 0.7);
            mouth.rotation.x = Math.PI / 2;
            head.add(mouth);

            scene.add(character);
            character.position.y = -0.2;

            animate();
        }

        // --- ۲. موتور انیمیشن و شبیه‌سازی زنده بودن ---
        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            if (head) {
                // انیمیشن‌های تنفس پایه
                head.position.y = Math.sin(elapsedTime * 1.5) * 0.03;
                head.rotation.z = Math.sin(elapsedTime * 0.5) * 0.02;

                // انیمیشن‌های وابسته به وضعیت (Status)
                if (currentStatus === 'LISTENING') {
                    head.position.z = THREE.MathUtils.lerp(head.position.z, 0.2, 0.1);
                    head.rotation.x = (Math.sin(elapsedTime * 4) * 0.02) + 0.05;
                } else if (currentStatus === 'THINKING') {
                    head.position.z = THREE.MathUtils.lerp(head.position.z, 0, 0.1);
                    leftEye.position.y = THREE.MathUtils.lerp(leftEye.position.y, 0.2, 0.1);
                    rightEye.position.y = THREE.MathUtils.lerp(rightEye.position.y, 0.2, 0.1);
                    head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, -0.15, 0.05);
                } else if (currentStatus === 'SPEAKING') {
                    head.position.z = THREE.MathUtils.lerp(head.position.z, 0.1, 0.1);
                    const mouthScale = 0.5 + Math.abs(Math.sin(elapsedTime * 12)) * 1.5;
                    mouth.scale.set(mouthScale, 1, mouthScale);
                    head.rotation.y = Math.sin(elapsedTime * 2) * 0.05;
                } else {
                    head.position.z = THREE.MathUtils.lerp(head.position.z, 0, 0.05);
                    leftEye.position.y = THREE.MathUtils.lerp(leftEye.position.y, 0.1, 0.1);
                    rightEye.position.y = THREE.MathUtils.lerp(rightEye.position.y, 0.1, 0.1);
                    if (Math.floor(elapsedTime) % 6 === 0) {
                        head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, Math.sin(elapsedTime) * 0.1, 0.05);
                    }
                }

                applyEmotionMetrics();
            }

            // سیستم پلک زدن طبیعی
            if (leftEye && rightEye) {
                let blink = Math.sin(elapsedTime * 0.8) > 0.98;
                leftEye.scale.y = blink ? 0.1 : 1;
                rightEye.scale.y = blink ? 0.1 : 1;
            }

            renderer.render(scene, camera);
        }

        function applyEmotionMetrics() {
            if (currentEmotion === 'happy') {
                mouth.scale.x = THREE.MathUtils.lerp(mouth.scale.x, 2, 0.1);
                leftEye.material.color.setHex(0x00ff88); 
                rightEye.material.color.setHex(0x00ff88);
            } else if (currentEmotion === 'sad') {
                head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, 0.15, 0.05);
                leftEye.material.color.setHex(0x5555ff); 
                rightEye.material.color.setHex(0x5555ff);
            } else if (currentEmotion === 'surprised') {
                leftEye.scale.set(1.4, 1.4, 1.4);
                rightEye.scale.set(1.4, 1.4, 1.4);
                leftEye.material.color.setHex(0xffaa00); 
                rightEye.material.color.setHex(0xffaa00);
            } else {
                leftEye.scale.set(1, 1, 1);
                rightEye.scale.set(1, 1, 1);
                leftEye.material.color.setHex(0x00d2ff);
                rightEye.material.color.setHex(0x00d2ff);
            }
        }

        function updateStatus(status) {
            currentStatus = status;
            statusIndicator.innerText = status;
        }

        // --- ۳. سیستم ضبط صدا و اتصال به شبکه OpenRouter ---
        function initVoiceSystem() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Voice recognition is not supported in this browser. Try Chrome.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US'; 

            recognition.onstart = () => updateStatus('LISTENING');
            
            recognition.onresult = async (event) => {
                const userText = event.results[event.results.length - 1][0].transcript;
                console.log("User input text:", userText);
                
                recognition.stop(); 
                await askOpenRouter(userText);
            };

            recognition.onend = () => {
                if (currentStatus === 'IDLE' || currentStatus === 'LISTENING') {
                    recognition.start();
                }
            };

            recognition.start();

            window.restartListening = () => {
                updateStatus('LISTENING');
                try { recognition.start(); } catch(e) {}
            };
        }

        // تابع ارتباط با API اوپن‌رایتر
        async function askOpenRouter(promptText) {
            updateStatus('THINKING');
            
            const systemPrompt = `You are a living virtual companion. You must respond to the user in a natural, conversational way. 
            Crucially, you must return your response STRICTLY as a JSON object, matching this format exactly:
            {
                "emotion": "choose one: neutral, happy, sad, thinking, surprised",
                "text": "your spoken response here (keep it concise, 1-2 sentences max)"
            }`;

            try {
                // آدرس Endpoint رسمی OpenRouter
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href, // الزامی برای OpenRouter
                        "X-Title": "AI Digital Companion"
                    },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: promptText }
                        ],
                        // اصرار به ساختار خروجی JSON در مدل‌هایی که پشتیبانی می‌کنند
                        response_format: { type: "json_object" } 
                    })
                });

                const data = await response.json();
                
                // هندل کردن ارورهای احتمالی خود کامپلیشن اوپن‌رایتر
                if (!data.choices || data.choices.length === 0) {
                    throw new Error("Invalid response structural payload from OpenRouter");
                }

                // استخراج و پارس کردن جیسون داخلی پاسخ مدل
                const aiResponseData = JSON.parse(data.choices[0].message.content);
                
                currentEmotion = aiResponseData.emotion;
                speak(aiResponseData.text);

            } catch (error) {
                console.error("OpenRouter API Error:", error);
                currentEmotion = 'sad';
                speak("I had trouble connecting to my brain. Please check the OpenRouter API key.");
            }
        }

        // --- ۴. تبدیل متن به گفتار (Text to Speech) ---
        function speak(textToSay) {
            updateStatus('SPEAKING');
            
            const utterance = new SpeechSynthesisUtterance(textToSay);
            utterance.lang = 'en-US';

            utterance.onend = () => {
                updateStatus('IDLE');
                currentEmotion = 'neutral';
                if (window.restartListening) window.restartListening();
            };

            window.speechSynthesis.speak(utterance);
        }

        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
